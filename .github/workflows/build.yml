name: Build Flow Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build -- --publish=never

      - uses: actions/upload-artifact@v4
        with:
          name: flow-windows
          path: dist/
