<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>txio | Universal Web3 IDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontSize: {
              'xs': ['0.85rem', { lineHeight: '1rem' }],
              'sm': ['0.95rem', { lineHeight: '1.25rem' }],
              'base': ['1.05rem', { lineHeight: '1.5rem' }],
              'lg': ['1.15rem', { lineHeight: '1.75rem' }],
              'xl': ['1.35rem', { lineHeight: '1.75rem' }],
              '2xl': ['1.65rem', { lineHeight: '2rem' }],
            },
            fontFamily: {
              sans: ['Space Grotesk', 'Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              'near-black': '#000000',
              'electric-violet': '#7b3ff2',
              'soft-purple': '#a78bfa',
              'dark-indigo-glow': '#050505',
              slate: {
                50: '#fafafa',
                100: '#f4f4f5',
                200: '#e4e4e7',
                300: '#d4d4d8',
                400: '#a1a1aa',
                500: '#71717a',
                600: '#52525b',
                700: '#3f3f46',
                800: '#27272a',
                900: '#18181b',
                950: '#09090b',
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.2s ease-out',
              'slide-in': 'slideIn 0.3s ease-out',
              'progress-indefinite': 'progress 1.5s ease-in-out infinite',
              'spin-slow': 'spin 3s linear infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideIn: {
                '0%': { transform: 'translateX(20px)', opacity: '0' },
                '100%': { transform: 'translateX(0)', opacity: '1' },
              },
              progress: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #000000;
      }
      ::-webkit-scrollbar-thumb {
        background: #27272a;
        border-radius: 4px;
        border: 2px solid #000000;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3f3f46;
      }
      html {
        font-size: 17px;
      }
      body {
        background-color: #000000;
        color: #e4e4e7;
        font-family: 'Space Grotesk', sans-serif;
        overflow: hidden;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Space Grotesk', sans-serif;
        line-height: 1.2;
        letter-spacing: -0.02em;
        font-weight: 600;
      }
      .dot-grid {
        background-image: radial-gradient(#27272a 1px, transparent 1px);
      }
    </style>
  </head>
  <body class="dot-grid">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
