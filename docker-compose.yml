services:
  mongodb:
    image: mongo:latest
    container_name: txio-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  api:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: txio-api
    # Secrets (JWT_SECRET, BREVO_API_KEY, GROQ_API_KEYS, ...) come from this
    # untracked file. Copy .env.example to backend/api/.env and fill it in.
    # The API fails fast if JWT_SECRET is missing or <32 chars (see config.rs).
    env_file:
      - ./backend/api/.env
    environment:
      MONGO_URI: mongodb://mongodb:27017/txio
      RUST_LOG: info
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: txio-frontend
    ports:
      - "5173:80"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - api

volumes:
  mongodb_data:
