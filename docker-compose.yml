services:
  mongodb:
    image: mongo:7.0
    container_name: txio-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  api:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: txio-api
    # Secrets (JWT_SECRET, BREVO_API_KEY, GROQ_API_KEYS, ...) come from this
    # untracked file. Copy .env.example to backend/api/.env and fill it in.
    # The API fails fast if JWT_SECRET is missing or <32 chars (see config.rs).
    env_file:
      - ./backend/api/.env
    environment:
      MONGO_URI: mongodb://mongodb:27017/txio
      RUST_LOG: info
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: txio-frontend
    ports:
      - "5173:80"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  mongodb_data:
